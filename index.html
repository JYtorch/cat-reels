<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>릴스 밈 에디터</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<script src="webm-muxer.js"></script>
<script src="mp4-muxer.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a16;--panel:#111122;--surface:#181830;--border:#252545;--accent:#e94560;--accent2:#4fc3f7;--text:#dde;--text2:#99a;--text3:#556}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;font-size:13px}
/* ─ HEADER ─ */
header{background:var(--panel);border-bottom:1px solid var(--border);padding:0 12px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
header h1{font-size:14px;color:var(--accent);font-weight:700;letter-spacing:1px;white-space:nowrap}
.hd-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.hd-grp{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
.hd-grp label{font-size:11px;color:var(--text3);white-space:nowrap}
header select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-size:11px;font-family:inherit}
header select:focus{outline:none;border-color:var(--accent)}
.btn{border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:700;transition:.15s;white-space:nowrap}
.btn:hover{filter:brightness(1.2)}
.btn-accent{background:var(--accent);color:#fff}
.btn-blue{background:#1a3a5a;color:var(--accent2);border:1px solid #2a4a6a}
.btn-dark{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-green{background:#1a3a1a;color:#6dff99}
.btn-dl{background:#1e5a30;color:#6dff99;display:none}
.ml-auto{margin-left:auto}
/* ─ MAIN LAYOUT ─ */
.main{display:flex;flex:1;overflow:hidden}
/* ─ LEFT PANEL ─ */
.lpanel{width:240px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-hd{background:var(--surface);padding:6px 10px;font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0}
.panel-hd span{color:var(--text3)}
.cut-list{flex:1;overflow-y:auto;padding:4px}
.cut-item{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:7px 8px;margin-bottom:4px;cursor:pointer;transition:.12s;user-select:none}
.cut-item:hover{border-color:#3a3a6a}
.cut-item.active{border-color:var(--accent);background:#1a0a14}
.ci-top{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.ci-num{font-size:10px;color:var(--text3);min-width:16px}
.ci-spk{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.spk-l{background:#0f2a3a;color:#4fc3f7}
.spk-r{background:#2a0f14;color:#ff8a80}
.ci-dur{margin-left:auto;font-size:10px;color:var(--text3)}
.ci-txt{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.ci-cats{font-size:10px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lp-btns{padding:5px 4px;display:flex;gap:4px;border-top:1px solid var(--border);flex-shrink:0}
.lp-btns .btn{flex:1;padding:5px 4px;font-size:10px}
/* ─ CENTER ─ */
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:var(--bg);overflow:hidden;padding:10px 8px 6px;gap:6px}
#canvas{border:1.5px solid var(--border);border-radius:6px;display:block;cursor:default}
.ctool{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.ctool .btn{padding:4px 8px;font-size:10px}
.ctool .btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctool .btn.slide-on{background:#f0a040;color:#000;border-color:#f0a040}
.statusbox{font-size:11px;color:var(--text3);text-align:center;min-height:16px;padding:0 4px}
/* ─ RIGHT PANEL ─ */
.rpanel{width:270px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.rpanel-body{flex:1;overflow-y:auto;padding:6px}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.sec-hd{padding:5px 10px;font-size:10px;font-weight:700;color:var(--accent2);background:rgba(79,195,247,.06);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;cursor:pointer}
.sec-hd:hover{background:rgba(79,195,247,.1)}
.sec-body{padding:8px 10px;display:flex;flex-direction:column;gap:5px}
.sec-body.hidden{display:none}
.prow{display:flex;align-items:center;gap:6px;min-height:22px}
.prow label{font-size:10px;color:var(--text3);min-width:52px;flex-shrink:0}
.prow input[type=text],.prow input[type=number]{flex:1;background:#0f1a2e;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:11px;font-family:inherit}
.prow input[type=text]:focus,.prow input[type=number]:focus{outline:none;border-color:var(--accent2)}
.prow select{flex:1;background:#0f1a2e;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:11px;font-family:inherit}
.prow input[type=range]{flex:1;accent-color:var(--accent)}
.prow input[type=color]{width:28px;height:22px;border:none;background:none;cursor:pointer;border-radius:3px}
.prow input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px}
.prow .pval{font-size:10px;color:var(--accent);min-width:24px;text-align:right}
.prow .pbtn{padding:2px 8px;font-size:10px;border:none;border-radius:4px;cursor:pointer;font-family:inherit}
.cat-row{display:flex;align-items:center;gap:4px}
.cat-row select{flex:1;background:#0f1a2e;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:11px;font-family:inherit}
.cat-row .cbtn{padding:2px 5px;font-size:10px;background:var(--surface);color:var(--text2);border:1px solid var(--border);border-radius:3px;cursor:pointer}
.cat-row .cbtn.on{background:#2a1a2a;color:#ff8a80;border-color:#ff8a80}
.textarea-wrap{display:flex;flex-direction:column;gap:3px}
.prow-full textarea{width:100%;background:#0f1a2e;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:12px;font-family:inherit;resize:vertical;min-height:52px}
.prow-full textarea:focus{outline:none;border-color:var(--accent2)}
.spk-btns{display:flex;gap:4px}
.spk-btn{flex:1;padding:3px;font-size:11px;font-weight:700;border:1.5px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text2);cursor:pointer;transition:.12s}
.spk-btn.on-l{background:#0f2a3a;border-color:#4fc3f7;color:#4fc3f7}
.spk-btn.on-r{background:#2a0f14;border-color:#ff8a80;color:#ff8a80}
/* ─ MODAL ─ */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;width:460px;max-height:80vh;display:flex;flex-direction:column;gap:10px}
.modal h2{font-size:14px;color:var(--accent);font-weight:700}
.modal-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);padding-bottom:8px}
.asset-tab{padding:4px 12px;font-size:11px;font-weight:700;border:none;border-radius:5px;cursor:pointer;background:var(--surface);color:var(--text2);font-family:inherit;transition:.12s}
.asset-tab.active{background:var(--accent);color:#fff}
.asset-content{flex:1;overflow-y:auto;min-height:120px}
.asset-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:5px;border:1px solid var(--border);margin-bottom:4px;background:var(--surface)}
.asset-item-name{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-item img{width:36px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0}
.asset-btn{padding:2px 7px;font-size:10px;border:none;border-radius:4px;cursor:pointer;font-family:inherit}
.asset-btn-use{background:#1a2a3a;color:var(--accent2)}
.asset-btn-del{background:#2a1a1a;color:#ff8a80}
.asset-upload-row{display:flex;gap:6px;margin-top:6px}
.asset-upload-row .btn{font-size:11px}
.asset-form{border:1px solid #3a3a6a;border-radius:6px;padding:8px;display:none;flex-direction:column;gap:6px;margin-top:6px;background:#0a0a20}
.asset-form.show{display:flex}
.asset-form input,.asset-form select{background:#0f1a2e;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 7px;font-size:12px;font-family:inherit}
.asset-form .form-btns{display:flex;gap:6px}
.asset-form .form-btns .btn{flex:1;padding:6px}
.asset-empty{color:var(--text3);font-size:11px;padding:12px;text-align:center}
/* ─ JSON MODAL ─ */
.json-textarea{width:100%;height:200px;background:#0a0a20;color:#6dff99;border:1px solid var(--border);border-radius:6px;padding:8px;font-family:monospace;font-size:11px;resize:vertical}
.modal-btns{display:flex;gap:6px}
/* ─ EXPORT OVERLAY ─ */
#export-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.exp-title{font-size:16px;font-weight:700;color:var(--accent)}
.exp-bar-wrap{width:280px;height:8px;background:#2a2a4a;border-radius:4px;overflow:hidden}
.exp-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .2s;width:0%}
.exp-pct{font-size:12px;color:var(--text2)}
.exp-sub{font-size:11px;color:var(--text3)}
/* ─ SPINNERS / ANIM ─ */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:10px;height:10px;border:2px solid #444;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px}
/* ─ SCROLLBAR ─ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
/* ─ DnD ─ */
.cut-item.dragging{opacity:0.4;border-style:dashed}
.cut-item.drag-over{border-color:var(--accent2)!important;background:#0a1a2a!important}
/* ─ MOBILE (기본: 숨김) ─ */
.mob-cut-strip,.mob-nav,.mob-sheet,.mob-backdrop{display:none}
/* ─ MOBILE (≤768px) ─ */
@media(max-width:768px){
  header{height:auto;min-height:44px;flex-wrap:wrap;padding:5px 8px;gap:5px}
  header h1{font-size:13px}
  .hd-sep{display:none}
  .lpanel,.rpanel{display:none!important}
  .main{flex-direction:column;overflow:hidden}
  .center{padding:4px 4px 0;gap:3px;justify-content:flex-start;width:100%;min-width:0}
  /* 캔버스 높이를 화면에 맞게 제한 — ctool/strip/nav 영역(~210px) 확보 */
  #canvas{width:min(calc(100vw - 8px),calc((100vh - 210px)*405/720))!important;width:min(calc(100vw - 8px),calc((100svh - 210px)*405/720))!important;height:auto!important;aspect-ratio:405/720}
  .ctool{gap:3px;flex-wrap:wrap}
  .ctool .btn{padding:6px 8px;font-size:11px}
  .statusbox{font-size:10px}
  .mob-cut-strip{display:flex;overflow-x:auto;gap:5px;padding:5px 8px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .mob-cut-strip::-webkit-scrollbar{display:none}
  .mob-cut{flex-shrink:0;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;cursor:pointer;min-width:56px;max-width:88px;text-align:center;user-select:none}
  .mob-cut.active{border-color:var(--accent);background:#1a0a14}
  .mob-cut-num{display:block;font-size:9px;color:var(--text3)}
  .mob-cut-txt{display:block;font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mob-nav{display:flex;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0}
  .mob-nav-btn{flex:1;padding:9px 2px;font-size:10px;font-weight:700;border:none;border-right:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
  .mob-nav-btn:last-child{border-right:none}
  .mob-nav-btn.accent{color:var(--accent)}
  .mob-nav-btn.slide-on{color:#f0a040}
  .mob-nav-btn.dl{color:#6dff99!important;background:#061a08}
  .mob-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300}
  .mob-backdrop.open{display:block}
  .mob-sheet{display:flex;position:fixed;bottom:0;left:0;right:0;max-height:72vh;background:var(--panel);border-top:1.5px solid var(--border);border-radius:14px 14px 0 0;z-index:301;transform:translateY(100%);transition:transform .26s ease;flex-direction:column}
  .mob-sheet.open{transform:translateY(0)}
  .mob-sheet-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 2px;flex-shrink:0;cursor:pointer}
  .mob-sheet-inner{overflow-y:auto;padding:0 8px 24px;flex:1}
}
</style>
</head>
<body>

<header>
  <h1>🐱 릴스 밈 에디터</h1>
  <div class="hd-sep"></div>
  <div class="hd-grp">
    <label>에피소드</label>
    <select id="ep-sel" onchange="loadEp(+this.value)"></select>
  </div>
  <div class="hd-grp">
    <label>BGM</label>
    <select id="bgm-sel" onchange="S.epBgm=this.value==='(없음)'?null:this.value;autoSave()">
      <option>(없음)</option>
    </select>
  </div>
  <div class="hd-sep"></div>
  <button class="btn btn-dark" onclick="undo()" title="실행 취소 (Ctrl+Z)">↩</button>
  <button class="btn btn-dark" onclick="redo()" title="다시 실행 (Ctrl+Y)">↪</button>
  <button class="btn btn-blue" onclick="openAssetModal()">📦 에셋 관리</button>
  <button class="btn btn-dark" onclick="openJsonModal()">📋 JSON</button>
  <div class="ml-auto"></div>
  <div class="hd-grp">
    <label>포맷</label>
    <select id="sel-fmt" title="내보내기 포맷 선택">
      <option value="mp4">MP4 (H.264)</option>
      <option value="webm">WebM (VP9)</option>
    </select>
  </div>
  <button class="btn btn-accent" id="btn-gen" onclick="startExport()">▶ 영상 생성</button>
  <button class="btn btn-dl" id="btn-dl" onclick="downloadVideo()">⬇ 다운로드</button>
</header>

<div class="main">
  <!-- LEFT: Cut List -->
  <div class="lpanel">
    <div class="panel-hd">컷 목록 <span id="cut-count"></span><span id="total-dur" style="margin-left:auto;color:var(--accent2);font-weight:normal"></span></div>
    <div class="cut-list" id="cut-list"></div>
    <div class="lp-btns">
      <button class="btn btn-dark" onclick="addCut()" title="현재 컷 복제 후 추가">+ 추가</button>
      <button class="btn btn-dark" onclick="dupCut()" title="현재 컷 복제">복제</button>
      <button class="btn btn-dark" onclick="delCut()" style="color:#ff8a80" title="현재 컷 삭제">삭제</button>
    </div>
  </div>

  <!-- CENTER: Preview -->
  <div class="center">
    <canvas id="canvas" width="405" height="720"></canvas>
    <div class="ctool">
      <button class="btn btn-dark" id="btn-sel-left"  onclick="selObj('left')"  title="왼쪽 캐릭터 선택">← 왼쪽</button>
      <button class="btn btn-dark" id="btn-sel-right" onclick="selObj('right')" title="오른쪽 캐릭터 선택">오른쪽 →</button>
      <button class="btn btn-dark" id="btn-sel-diag"  onclick="selObj('diag')"  title="자막 선택">자막</button>
      <button class="btn btn-dark" id="btn-sel-title" onclick="selObj('title')" title="타이틀 선택">타이틀</button>
      <button class="btn btn-dark" id="btn-slide"     onclick="toggleSlideshow()">▶ 슬라이드</button>
      <button class="btn btn-dark" onclick="resetCutLayout()" title="레이아웃 초기화">↺ 초기화</button>
      <button class="btn btn-dark" onclick="copyToAll()" title="현재 레이아웃을 모든 컷에 적용">레이아웃→전체</button>
    </div>
    <div class="statusbox" id="statusbox">대기 중</div>
  </div>

  <!-- RIGHT: Properties -->
  <div class="rpanel">
    <div class="panel-hd">속성</div>
    <div class="rpanel-body" id="rpanel-body">
      <div style="color:var(--text3);font-size:11px;padding:12px;text-align:center">컷을 선택하세요</div>
    </div>
  </div>
</div>

<!-- Mobile Cut Strip -->
<div class="mob-cut-strip" id="mob-cut-strip"></div>
<!-- Mobile Bottom Nav -->
<div class="mob-nav">
  <button class="mob-nav-btn" onclick="openMobileProps()">⚙속성</button>
  <button class="mob-nav-btn" onclick="addCut()">＋추가</button>
  <button class="mob-nav-btn" onclick="dupCut()">복제</button>
  <button class="mob-nav-btn" onclick="delCut()" style="color:#ff8a80">삭제</button>
  <button class="mob-nav-btn" id="mob-slide-btn" onclick="toggleSlideshow()">▶</button>
  <button class="mob-nav-btn accent" id="mob-export-btn" onclick="mobExportAction()">⬇생성</button>
</div>
<!-- Mobile Bottom Sheet (속성) -->
<div class="mob-backdrop" id="mob-backdrop" onclick="closeMobileProps()"></div>
<div class="mob-sheet" id="mob-sheet">
  <div class="mob-sheet-handle" onclick="closeMobileProps()"></div>
  <div class="mob-sheet-inner" id="mob-sheet-inner"></div>
</div>

<!-- Asset Modal -->
<div class="modal-backdrop" id="asset-modal">
  <div class="modal" style="width:500px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2>📦 에셋 관리</h2>
      <button class="btn btn-dark" onclick="closeModal('asset-modal')">✕ 닫기</button>
    </div>
    <div class="modal-tabs">
      <button class="asset-tab active" onclick="switchAssetTab('cat',this)">🐱 캐릭터 영상</button>
      <button class="asset-tab" onclick="switchAssetTab('bg',this)">🖼 배경</button>
      <button class="asset-tab" onclick="switchAssetTab('audio',this)">🎵 오디오</button>
    </div>
    <div class="asset-content" id="asset-content"></div>
  </div>
</div>

<!-- JSON Modal -->
<div class="modal-backdrop" id="json-modal">
  <div class="modal" style="width:520px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2>📋 JSON 내보내기 / 불러오기</h2>
      <button class="btn btn-dark" onclick="closeModal('json-modal')">✕</button>
    </div>
    <textarea class="json-textarea" id="json-ta" spellcheck="false"></textarea>
    <div class="modal-btns">
      <button class="btn btn-accent" onclick="exportJson()">내보내기 (복사)</button>
      <button class="btn btn-blue" onclick="importJson()">불러오기</button>
      <button class="btn btn-dark" onclick="closeModal('json-modal')">닫기</button>
    </div>
  </div>
</div>

<!-- Export Progress Overlay -->
<div id="export-overlay">
  <div class="exp-title">🎬 영상 렌더링 중...</div>
  <div class="exp-bar-wrap"><div class="exp-bar" id="exp-bar"></div></div>
  <div class="exp-pct" id="exp-pct">0%</div>
  <div class="exp-sub" id="exp-sub">초기화 중...</div>
</div>

<script>
// ═══════════════════════════════════════════════
// 에피소드 데이터
// ═══════════════════════════════════════════════
const EPISODES = [
  { id:1, desc:"사내교육 코딩 논란",
    background:"bg_ep1_office", bgm:null,
    left_name:"개발 3년차", default_left_cat:"typing_keyboard",
    right_name:"팀원", default_right_cat:"talk",

// 상수 & 컨텍스트
// ═══════════════════════════════════════════════
const FW=1080, FH=1920;
const PREVIEW_CW=405, PREVIEW_CH=720;
const EXPORT_CW=1080, EXPORT_CH=1920;
const HANDLE_R=7;

const canvas = document.getElementById('canvas');
const procCanvas = document.createElement('canvas');
const procCtx = procCanvas.getContext('2d', {willReadFrequently:true});

let ctx = canvas.getContext('2d');
let CW = PREVIEW_CW, CH = PREVIEW_CH, SC = PREVIEW_CW/FW;

// ═══════════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════════
const Assets = { cats:{}, backgrounds:{}, audio:{} };
let catInfo = {};

function rebuildCatInfo(){
  catInfo = {};
  for(const [n,c] of Object.entries(Assets.cats))
    catInfo[n] = {faces:c.faces, src_w:c.src_w, src_h:c.src_h, aspect:c.src_w/c.src_h, defaultSfx:c.defaultSfx||null};
  for(const [n,m] of Object.entries(DEFAULT_CAT_META))
    if(!catInfo[n]) catInfo[n] = {faces:m.faces, src_w:m.src_w, src_h:m.src_h, aspect:m.src_w/m.src_h, defaultSfx:m.defaultSfx||null};
}

// 캐릭터 이름 → 기본 SFX 반환
function catDefaultSfx(name){ return catInfo[name]?.defaultSfx || null; }

function catWF(name,h){ const a=catInfo[name]?.aspect; return a?Math.round(h*a):Math.round(h*1.78); }
function allCatNames(){ return [...new Set([...Object.keys(DEFAULT_CAT_META),...Object.keys(Assets.cats)])].sort(); }
function allBgNames(){ return Object.keys(Assets.backgrounds).sort(); }
function allAudioNames(){ return ['(없음)',...Object.keys(Assets.audio).sort()]; }

let S = mkState();
function mkState(){
  return {
    epId:1, ep:null, cuts:[], dlgIdx:0, selected:null, epBgm:null,
    title:{enabled:false,text:'',fontSz:52,bgAlpha:170,color:'#ffffff',auto:true,x:null,y:null,autoY:60,_cx:0,_cy:0,_cw:0,_ch:0}
  };
}

function cut(){ return S.cuts[S.dlgIdx]||{}; }
function setC(k,v){ if(slideshowActive) return; const c=S.cuts[S.dlgIdx]; if(c){ c[k]=v; autoSave(); } }

function mkCut(ep, d){
  const lc = d?.left_cat  || ep.default_left_cat;
  const rc = d?.right_cat || ep.default_right_cat;
  return {
    speaker: d?.speaker||'left', dur: d?.dur||3.0,
    text: d?.text||'', sfx: d?.sfx||null,
    bg: ep.background||'',
    leftCat:lc,  leftH:580,  leftX:-60, leftY:null,  leftFlipH:false, leftFlipV:false,
    rightCat:rc, rightH:580, rightX:null, rightY:null, rightFlipH:false, rightFlipV:false,
    diagAuto:true, diagX:null, diagY:null,
    diagFontSz:54, diagMaxW:720, diagBgAlpha:210, diagColor:'#ffffff',
    leftLabelText:ep.left_name,  leftLabelFontSz:76, leftLabelAuto:true, leftLabelX:null, leftLabelY:null,
    rightLabelText:ep.right_name,rightLabelFontSz:76, rightLabelAuto:true,rightLabelX:null,rightLabelY:null,
    _lbl:{}, _diag:{},
  };
}

function getRX(c){ return c.rightX!==null?c.rightX:FW-catWF(c.rightCat,c.rightH)+60; }
function getLY(c){ return c.leftY!==null?c.leftY:FH-c.leftH-100; }
function getRY(c){ return c.rightY!==null?c.rightY:FH-c.rightH-100; }

// ═══════════════════════════════════════════════
// 그린스크린
// ═══════════════════════════════════════════════
function applyGS(data){
  for(let i=0;i<data.length;i+=4){
    const r=data[i], g=data[i+1], b=data[i+2];
    const maxRB=Math.max(r,b);
    const diff=g-maxRB;
    // Python reels_maker.py와 동일한 파라미터: threshold=30, range=50
    const a=Math.max(0,Math.min(1,1-(diff-30)/50));
    data[i+3]=Math.round(a*255);
    // 그린 스필 억제: 반투명 경계 픽셀의 녹색 채널을 max(r,b)로 억제
    if(diff>0 && a<1){
      data[i+1]=Math.min(g, maxRB);
    }
  }
}

// ═══════════════════════════════════════════════
// 드로우 함수
// ═══════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,CW,CH);
  const c=cut();
  if(!c||!S.ep){ ctx.fillStyle='#1a1a3e'; ctx.fillRect(0,0,CW,CH); return; }
  drawBg(c); drawCat('right',c); drawCat('left',c); drawOverlays(c); drawTitle(); drawHandles();
}

function drawBg(c){
  const bg=Assets.backgrounds[c.bg];
  if(bg?.ready){
    const img=bg.img, iw=img.naturalWidth, ih=img.naturalHeight;
    const tr=CW/CH, ir=iw/ih;
    let sx,sy,sw,sh;
    if(ir>tr){ sh=ih;sw=Math.round(ih*tr);sx=Math.round((iw-sw)/2);sy=0; }
    else      { sw=iw;sh=Math.round(iw/tr);sx=0;sy=Math.round((ih-sh)/2); }
    ctx.drawImage(img,sx,sy,sw,sh,0,0,CW,CH);
  } else {
    const g=ctx.createLinearGradient(0,0,0,CH);
    g.addColorStop(0,'#193c78'); g.addColorStop(1,'#081430');
    ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  }
}

function shouldFlip(name,side){
  const f=catInfo[name]?.faces; if(!f||f==='forward') return false;
  return (side==='left'&&f==='left')||(side==='right'&&f==='right');
}

// 캐릭터별 마지막 성공 프레임 캐시 (루프 전환 순간 readyState 하락 대비)
const _catFrameCache = {};
// 내보내기 전용 프레임 캐시: cacheKey → ImageData[] (크로마키 적용 완료)
let _exportFrameCache = null;
// 내보내기 중 현재 컷 내 경과 시간(초) — drawCat이 정확한 프레임 인덱스를 참조
let _exportCutElapsedSec = 0;

function drawCat(side,c){
  const name=side==='left'?c.leftCat:c.rightCat;
  const h=side==='left'?c.leftH:c.rightH;
  const cw=catWF(name,h)*SC, ch=h*SC;
  const ox=(side==='left'?c.leftX:getRX(c))*SC;
  const oy=(side==='left'?getLY(c):getRY(c))*SC;
  const flipH=(shouldFlip(name,side))!==(side==='left'?c.leftFlipH:c.rightFlipH);
  const flipV=side==='left'?c.leftFlipV:c.rightFlipV;
  const asset=Assets.cats[name];
  const pcw=Math.max(1,Math.ceil(cw)), pch=Math.max(1,Math.ceil(ch));
  const cacheKey=`${name}_${pcw}_${pch}_${flipH?1:0}_${flipV?1:0}`;

  // 내보내기 모드: seek으로 미리 수집한 크로마키 프레임 사용 (정확한 타이밍 보장)
  if(_exportFrameCache){
    const frames=_exportFrameCache[cacheKey];
    if(frames&&frames.length){
      const idx=Math.floor(_exportCutElapsedSec*30)%frames.length;
      procCanvas.width=pcw; procCanvas.height=pch;
      procCtx.putImageData(frames[idx],0,0);
      ctx.drawImage(procCanvas,ox,oy,cw,ch);
      return;
    }
    // frames 없음(캐시 미스): 아래 live 캡처로 폴백
  }

  // iOS: asset.ready=false인 경우 play 재시도 (첫 제스처 이후 가능해질 수 있음)
  if(asset?.video && !asset.ready && asset.video.readyState>=1){
    asset.video.play().then(()=>{ asset.ready=true; }).catch(()=>{});
  }

  // 미리보기 모드: 실시간 video 요소에서 프레임 캡처
  if(asset?.ready&&asset.video&&asset.video.readyState>=2){
    const vid=asset.video;
    procCanvas.width=pcw; procCanvas.height=pch;
    procCtx.save();
    if(flipH){procCtx.translate(pcw,0);procCtx.scale(-1,1);}
    if(flipV){procCtx.translate(0,pch);procCtx.scale(1,-1);}
    procCtx.drawImage(vid,0,0,pcw,pch);
    procCtx.restore();
    try{
      const id=procCtx.getImageData(0,0,pcw,pch);
      applyGS(id.data); procCtx.putImageData(id,0,0);
      // 마지막 성공 프레임 캐시에 저장
      let fc=_catFrameCache[cacheKey];
      if(!fc||fc.width!==pcw||fc.height!==pch){
        fc=document.createElement('canvas'); fc.width=pcw; fc.height=pch;
        _catFrameCache[cacheKey]=fc;
      }
      fc.getContext('2d').drawImage(procCanvas,0,0);
      ctx.drawImage(procCanvas,ox,oy,cw,ch);
    }catch(e){
      // CORS/보안 오류: 크로마키 없이 원본 드로우
      ctx.drawImage(vid,ox,oy,cw,ch);
    }
  } else if(_catFrameCache[cacheKey]){
    // 비디오 루프 전환 순간 readyState 일시 하락 → 마지막 캐시 프레임 사용
    ctx.drawImage(_catFrameCache[cacheKey],ox,oy,cw,ch);
  } else {
    // 아직 한 번도 그린 적 없을 때만 placeholder
    ctx.save(); ctx.strokeStyle='#4fc3f766'; ctx.lineWidth=1.5; ctx.setLineDash([6,4]);
    const vx=Math.max(0,ox),vy=Math.max(0,oy),vw=Math.min(CW,ox+cw)-vx,vh=Math.min(CH,oy+ch)-vy;
    if(vw>0&&vh>0){
      ctx.strokeRect(vx,vy,vw,vh); ctx.setLineDash([]);
      ctx.fillStyle='#4fc3f7aa'; ctx.font=`bold ${Math.min(14,Math.floor(vw/5))}px 'Noto Sans KR',sans-serif`;
      ctx.textAlign='center'; ctx.fillText(name,vx+vw/2,vy+vh/2); ctx.textAlign='left';
    }
    ctx.restore();
  }
}

function drawOverlays(c){
  const lW=catWF(c.leftCat,c.leftH)*SC, rW=catWF(c.rightCat,c.rightH)*SC;
  const lX=c.leftX*SC, lY=getLY(c)*SC, rX=getRX(c)*SC, rY=getRY(c)*SC;
  const lVisCx=(Math.max(0,lX)+Math.min(CW,lX+lW))/2;
  const rVisCx=(Math.max(0,rX)+Math.min(CW,rX+rW))/2;
  drawLabel(c.leftLabelText,c.leftLabelFontSz,c.leftLabelAuto,c.leftLabelX,c.leftLabelY,lVisCx,lY-18*SC,'leftLabel',c);
  drawLabel(c.rightLabelText,c.rightLabelFontSz,c.rightLabelAuto,c.rightLabelX,c.rightLabelY,rVisCx,rY-18*SC,'rightLabel',c);
  drawDialogue(c,lVisCx,rVisCx);
}

function drawLabel(text,fontSize,auto,lx,ly,autoCx,autoBaseY,lblKey,c){
  if(!text) return;
  const sz=Math.round(fontSize*SC);
  ctx.font=`bold ${sz}px 'Noto Sans KR',sans-serif`;
  const tw=ctx.measureText(text).width;
  let x,y;
  if(!auto&&lx!==null){ x=lx*SC; y=ly*SC+sz; }
  else { x=autoCx-tw/2; y=autoBaseY; if(c) c._lbl[lblKey+'_x']=x/SC,c._lbl[lblKey+'_y']=(y-sz)/SC; }
  if(c) c._lbl[lblKey]={cx:x,cy:y-sz-2,cw:tw+8,ch:sz+8};
  ctx.lineWidth=Math.max(1,3*SC); ctx.strokeStyle='#000'; ctx.lineJoin='round';
  ctx.strokeText(text,x,y); ctx.fillStyle='#fff'; ctx.fillText(text,x,y);
}

function drawDialogue(c,lVisCx,rVisCx){
  if(!c.text) return;
  const lines=c.text.split('\n');
  const fs=Math.round(c.diagFontSz*SC);
  ctx.font=`bold ${fs}px 'Noto Sans KR',sans-serif`;
  const padX=30*SC,padY=22*SC,gap=10*SC;
  const refLine=lines.find(l=>l.trim())||'가';
  const m0=ctx.measureText(refLine);
  const asc=m0.actualBoundingBoxAscent||fs*.8, desc=m0.actualBoundingBoxDescent||fs*.2;
  const textH=asc+desc;
  const tw=Math.min(Math.max(...lines.map(l=>ctx.measureText(l).width))+padX*2,c.diagMaxW*SC);
  const th=lines.length*textH+Math.max(0,lines.length-1)*gap+padY*2;
  let dx,dy;
  if(!c.diagAuto&&c.diagX!==null){ dx=c.diagX*SC; dy=c.diagY*SC; }
  else {
    const cx=c.speaker==='left'?lVisCx:rVisCx;
    const lblKey=c.speaker==='left'?'leftLabel':'rightLabel';
    const lblY=c._lbl[lblKey]?.cy??((c.speaker==='left'?getLY(c):getRY(c))*SC-20);
    dx=Math.max(10,Math.min(CW-tw-10,cx-tw/2));
    dy=Math.max(10,lblY-th-8*SC);
  }
  if(c) c._diag={cx:dx,cy:dy,cw:tw,ch:th};
  ctx.fillStyle=`rgba(15,15,15,${(c.diagBgAlpha/255).toFixed(2)})`;
  rrect(ctx,dx,dy,tw,th,12*SC); ctx.fill();
  ctx.lineWidth=Math.max(1,2*SC); ctx.strokeStyle='#000'; ctx.lineJoin='round';
  lines.forEach((ln,i)=>ctx.strokeText(ln,dx+padX,dy+padY+asc+i*(textH+gap)));
  ctx.fillStyle=c.diagColor||'#fff';
  lines.forEach((ln,i)=>ctx.fillText(ln,dx+padX,dy+padY+asc+i*(textH+gap)));
}

function drawTitle(){
  const t=S.title; if(!t.enabled||!t.text) return;
  const fs=Math.round(t.fontSz*SC);
  ctx.font=`bold ${fs}px 'Noto Sans KR',sans-serif`;
  const tw=ctx.measureText(t.text).width;
  const m=ctx.measureText(t.text);
  const asc=m.actualBoundingBoxAscent||fs*.8, desc=m.actualBoundingBoxDescent||fs*.2;
  const padX=32*SC,padY=18*SC;
  const bw=tw+padX*2, bh=(asc+desc)+padY*2;
  let bx,by;
  if(!t.auto&&t.x!==null){ bx=t.x*SC; by=t.y*SC; }
  else { bx=(CW-bw)/2; by=t.autoY*SC; }
  t._cx=bx; t._cy=by; t._cw=bw; t._ch=bh;
  ctx.fillStyle=`rgba(10,10,10,${(t.bgAlpha/255).toFixed(2)})`;
  rrect(ctx,bx,by,bw,bh,8*SC); ctx.fill();
  ctx.lineWidth=Math.max(1,2*SC); ctx.strokeStyle='#000';
  ctx.strokeText(t.text,bx+padX,by+padY+asc);
  ctx.fillStyle=t.color||'#fff'; ctx.fillText(t.text,bx+padX,by+padY+asc);
}

function drawHandles(){
  if(isExporting||!S.selected) return;
  const b=selBounds(); if(!b) return;
  const {x,y,w,h}=b;
  const clr={left:'#4fc3f7',right:'#ff8a80',diag:'#ffe066',leftLabel:'#66ff99',rightLabel:'#66ff99',title:'#ffaa44'};
  ctx.strokeStyle=clr[S.selected]||'#fff'; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
  ctx.strokeRect(x,y,w,h); ctx.setLineDash([]);
  hpositions(x,y,w,h).forEach(([hx,hy])=>{
    ctx.beginPath(); ctx.arc(hx,hy,HANDLE_R,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=1; ctx.stroke();
  });
}

function rrect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

function selBounds(){
  const c=cut();
  if(S.selected==='left'||S.selected==='right'){
    const isL=S.selected==='left';
    const name=isL?c.leftCat:c.rightCat, h=isL?c.leftH:c.rightH;
    return {x:(isL?c.leftX:getRX(c))*SC,y:(isL?getLY(c):getRY(c))*SC,w:catWF(name,h)*SC,h:h*SC};
  }
  if(S.selected==='diag'&&c._diag?.cw) return {x:c._diag.cx,y:c._diag.cy,w:c._diag.cw,h:c._diag.ch};
  if((S.selected==='leftLabel'||S.selected==='rightLabel')&&c._lbl[S.selected]){
    const lb=c._lbl[S.selected]; return {x:lb.cx,y:lb.cy,w:lb.cw,h:lb.ch};
  }
  if(S.selected==='title'&&S.title._cw) return {x:S.title._cx,y:S.title._cy,w:S.title._cw,h:S.title._ch};
  return null;
}
function hpositions(x,y,w,h){ return [[x,y],[x+w,y],[x,y+h],[x+w,y+h]]; }

let animHandle=null, lastRender=0;
function startAnim(){
  if(animHandle) return;
  function loop(ts){ if(ts-lastRender>=33){draw();lastRender=ts;} animHandle=requestAnimationFrame(loop); }
  animHandle=requestAnimationFrame(loop);
}
function stopAnim(){ if(animHandle){cancelAnimationFrame(animHandle);animHandle=null;} }

// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// 내보내기 전용 프레임 사전 캐시 (Python preload_gs와 동일 방식)
// seek 기반으로 각 프레임을 정확한 타임코드에 캡처 후 크로마키 처리
// ═══════════════════════════════════════════════
async function buildExportFrameCache(cuts, onSub, onProgress){
  const EXP_FPS=30;
  const cache={};

  // SC=1.0 기준으로 사용되는 고유 (name, pcw, pch, flipH, flipV) 조합 수집
  const combos=new Map();
  for(const c of cuts){
    for(const side of ['left','right']){
      const name =side==='left'?c.leftCat:c.rightCat;
      const h    =side==='left'?c.leftH  :c.rightH;
      const cw   =catWF(name,h); // SC=1.0
      const flipH=(shouldFlip(name,side))!==(side==='left'?c.leftFlipH:c.rightFlipH);
      const flipV=side==='left'?c.leftFlipV:c.rightFlipV;
      const pcw  =Math.max(1,Math.ceil(cw));
      const pch  =Math.max(1,Math.ceil(h));
      const key  =`${name}_${pcw}_${pch}_${flipH?1:0}_${flipV?1:0}`;
      if(!combos.has(key)){
        const asset=Assets.cats[name];
        if(asset?.video) combos.set(key,{name,pcw,pch,flipH,flipV,vid:asset.video});
      }
    }
  }

  const tmpCanvas=document.createElement('canvas');
  const tmpCtx   =tmpCanvas.getContext('2d',{willReadFrequently:true});
  let doneCount=0;
  const totalCombos=Math.max(1,combos.size);

  for(const [key,{name,pcw,pch,flipH,flipV,vid}] of combos){
    onSub(`캐릭터 캐시: ${name} (${doneCount+1}/${combos.size})`);

    // 재생 중 seek 충돌 방지: 캐시 빌드 동안 일시정지
    const wasPlaying=!vid.paused;
    if(wasPlaying) vid.pause();

    // duration 확보 대기 (readyState<1이면 메타데이터 로드 대기)
    if(!isFinite(vid.duration)||vid.duration<=0){
      await new Promise(r=>{
        if(vid.readyState>=1){r();return;}
        vid.addEventListener('loadedmetadata',r,{once:true});
      });
    }
    const duration=vid.duration;

    // duration이 유효하지 않으면 이 캐릭터 스킵 (런타임에서 live 캡처 폴백)
    if(!isFinite(duration)||duration<=0){
      if(wasPlaying) vid.play().catch(()=>{});
      doneCount++;
      continue;
    }

    const totalFrames=Math.round(duration*EXP_FPS)||1;
    tmpCanvas.width=pcw; tmpCanvas.height=pch;
    const frames=[];

    for(let i=0;i<totalFrames;i++){
      const t=Math.min(i/EXP_FPS, duration-1e-4);
      // addEventListener를 currentTime 설정 전에 등록해야 race condition 방지
      await new Promise(r=>{
        vid.addEventListener('seeked',r,{once:true});
        vid.currentTime=t;
      });

      tmpCtx.save();
      tmpCtx.clearRect(0,0,pcw,pch);
      if(flipH){tmpCtx.translate(pcw,0);tmpCtx.scale(-1,1);}
      if(flipV){tmpCtx.translate(0,pch);tmpCtx.scale(1,-1);}
      tmpCtx.drawImage(vid,0,0,pcw,pch);
      tmpCtx.restore();

      const id=tmpCtx.getImageData(0,0,pcw,pch);
      applyGS(id.data);
      frames.push(id);

      // 매 5프레임마다 진행률 업데이트 및 이벤트 루프 양보
      if(i%5===0){
        onProgress((doneCount+i/totalFrames)/totalCombos);
        await new Promise(r=>setTimeout(r,0));
      }
    }

    cache[key]=frames;
    doneCount++;

    // 각 캐릭터 캐시 완료 후 재생 복원
    if(wasPlaying){ vid.currentTime=0; vid.play().catch(()=>{}); }
  }

  onProgress(1);
  return cache;
}

// 영상 내보내기 (WebCodecs + webm-muxer)
// ═══════════════════════════════════════════════
let exportBlob=null;
let isExporting=false;

let _mobExportDone=false;
function mobExportAction(){
  if(_mobExportDone&&exportBlob){ downloadVideo(); return; }
  startExport();
}
function _resetMobExportBtn(){
  _mobExportDone=false;
  const b=document.getElementById('mob-export-btn');
  if(b){b.textContent='⬇생성';b.classList.remove('dl');}
}
function _doneMobExportBtn(){
  _mobExportDone=true;
  const b=document.getElementById('mob-export-btn');
  if(b){b.textContent='⬇다운로드';b.classList.add('dl');}
}

async function startExport(){
  const btn=document.getElementById('btn-gen');
  btn.disabled=true;
  document.getElementById('btn-dl').style.display='none';
  exportBlob=null;
  _resetMobExportBtn();

  if(slideshowActive) stopSlideshow();
  stopAnim();

  setExpOverlay(true,'초기화 중...',0);

  // 브라우저 지원 확인
  if(!window.VideoEncoder){
    setExpOverlay(false);
    setStatus('❌ Chrome/Edge 94+ 이상에서만 지원됩니다.');
    btn.disabled=false; startAnim(); return;
  }

  const totalDur=S.cuts.reduce((s,c)=>s+(c.dur||3),0);
  if(totalDur<=0){
    setExpOverlay(false);
    setStatus('❌ 재생 시간이 0입니다.');
    btn.disabled=false; startAnim(); return;
  }

  // export 모드 진입 — 선택 UI 숨김
  isExporting=true;
  S.selected=null;

  // globals 저장
  const savedCtx=ctx, savedCW=CW, savedCH=CH, savedSC=SC, savedIdx=S.dlgIdx;

  function restoreGlobals(){
    isExporting=false;
    _exportFrameCache=null; // 내보내기 프레임 캐시 해제
    ctx=savedCtx; CW=PREVIEW_CW; CH=PREVIEW_CH; SC=PREVIEW_CW/FW;
    S.dlgIdx=savedIdx; setExpOverlay(false);
    btn.disabled=false; startAnim(); draw();
  }

  try {
    const fmt = document.getElementById('sel-fmt').value; // 'mp4' or 'webm'
    const useMP4 = fmt === 'mp4';

    // ── muxer 라이브러리 확인
    if(useMP4){
      if(!window.Mp4Muxer) throw new Error('mp4-muxer.js 로드 실패. 파일 옆에 mp4-muxer.js가 있는지 확인하세요.');
    } else {
      if(!window.WebMMuxer) throw new Error('webm-muxer.js 로드 실패. 파일 옆에 webm-muxer.js가 있는지 확인하세요.');
    }

    // ── 오디오 오프라인 렌더
    setExpSub('오디오 렌더링...');
    let audioRendered=null;
    try { audioRendered=await renderAudioOffline(totalDur); } catch(e){ console.warn('오디오 렌더 실패:',e); }

    const hasAudio = !!(audioRendered && window.AudioEncoder);

    // ── 모바일 여부에 따라 경량/풀화질 경로 분기
    // 모바일: 프레임 캐시 스킵(메모리 절약), 540×960, 15fps, 일반 canvas
    // 데스크탑: 기존 방식 유지 (1080×1920, 30fps, OffscreenCanvas)
    const expMobile = isMobile();
    const expCW  = expMobile ? 540  : EXPORT_CW;
    const expCH  = expMobile ? 960  : EXPORT_CH;
    const expFPS = expMobile ? 15   : 30;
    const expBR  = expMobile ? 3_000_000 : 8_000_000;

    // ── 모바일: export 전 모든 비디오 재생 보장 (캐릭터 미표시 방지)
    if(expMobile){
      setExpSub('비디오 준비 중...');
      await Promise.allSettled(
        Object.values(Assets.cats)
          .filter(a=>a.video)
          .map(a=>a.video.play().then(()=>{a.ready=true;}).catch(()=>{}))
      );
      await new Promise(r=>setTimeout(r,300)); // 첫 프레임 decode 대기
    }

    // ── 캐릭터 프레임 사전 캐시 (데스크탑만 — 모바일은 메모리 초과 방지를 위해 스킵)
    if(!expMobile){
      setExpSub('캐릭터 프레임 캐시 중...');
      _exportFrameCache = await buildExportFrameCache(S.cuts, setExpSub, p=>setExpProgress(p*20));
    } else {
      _exportFrameCache = null;
      setExpProgress(20);
    }

    // ── 사용 가능한 H.264 코덱 문자열 탐색 (iOS 호환성)
    async function pickH264Codec(w,h,fps,br){
      const candidates=['avc1.640028','avc1.4d0028','avc1.4D401F','avc1.42E028','avc1.42E01F'];
      for(const codec of candidates){
        try{
          const s=await VideoEncoder.isConfigSupported({codec,width:w,height:h,bitrate:br,framerate:fps});
          if(s.supported) return codec;
        }catch(e){}
      }
      return 'avc1.42E01F';
    }

    // ── muxer / encoder 설정
    let muxer, videoEncoder;
    if(useMP4){
      const { Muxer, ArrayBufferTarget } = window.Mp4Muxer;
      muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video:{ codec:'avc', width:expCW, height:expCH },
        ...(hasAudio ? {audio:{codec:'aac',numberOfChannels:2,sampleRate:44100}} : {}),
        firstTimestampBehavior:'offset',
        fastStart:'in-memory',
      });
      const h264codec = await pickH264Codec(expCW, expCH, expFPS, expBR);
      videoEncoder = new VideoEncoder({
        output:(chunk,meta)=>muxer.addVideoChunk(chunk,meta),
        error:(e)=>{ throw e; },
      });
      videoEncoder.configure({
        codec: h264codec,
        width:expCW, height:expCH,
        bitrate:expBR, framerate:expFPS,
      });
    } else {
      const { Muxer, ArrayBufferTarget } = window.WebMMuxer;
      muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video:{ codec:'V_VP9', width:expCW, height:expCH, frameRate:expFPS },
        ...(hasAudio ? {audio:{codec:'A_OPUS',numberOfChannels:2,sampleRate:44100}} : {}),
        firstTimestampBehavior:'offset',
      });
      videoEncoder = new VideoEncoder({
        output:(chunk,meta)=>muxer.addVideoChunk(chunk,meta),
        error:(e)=>{ throw e; },
      });
      videoEncoder.configure({
        codec:'vp09.00.10.08',
        width:expCW, height:expCH,
        bitrate:expBR, framerate:expFPS,
      });
    }

    // ── 렌더 canvas 생성
    // 모바일: 일반 HTMLCanvasElement (OffscreenCanvas는 iOS에서 VideoFrame 생성 시 크래시 유발)
    // 데스크탑: OffscreenCanvas (메인 스레드 블로킹 없음)
    let expCanvas;
    if(!expMobile && typeof OffscreenCanvas!=='undefined'){
      expCanvas = new OffscreenCanvas(expCW, expCH);
    } else {
      expCanvas = document.createElement('canvas');
      expCanvas.width = expCW; expCanvas.height = expCH;
    }
    ctx=expCanvas.getContext('2d'); CW=expCW; CH=expCH; SC=expCW/FW;

    // ── 폰트 로딩 대기
    await document.fonts.ready;

    // ── 비디오 프레임 렌더 루프
    const totalFrames=Math.ceil(totalDur*expFPS);
    const EXP_FPS=expFPS;
    const FDuration=Math.round(1_000_000/EXP_FPS);

    setExpSub(`비디오 렌더링 (${totalFrames}프레임)...`);
    await new Promise(resolve=>{
      const MS_PER_FRAME = 1000 / EXP_FPS;
      let frameCount=0, cutIdx=0, cutElapsed=0;
      function frame(){
        cutElapsed += MS_PER_FRAME;
        while(cutIdx<S.cuts.length-1&&cutElapsed>=(S.cuts[cutIdx].dur||3)*1000){
          cutElapsed-=(S.cuts[cutIdx].dur||3)*1000; cutIdx++;
        }
        S.dlgIdx=cutIdx;
        _exportCutElapsedSec=cutElapsed/1000;
        draw();

        const timestamp=Math.round(frameCount*1_000_000/EXP_FPS);
        const vf=new VideoFrame(expCanvas,{timestamp,duration:FDuration});
        videoEncoder.encode(vf,{keyFrame:frameCount%30===0});
        vf.close();

        frameCount++;
        setExpProgress(frameCount/totalFrames*(hasAudio?70:95));
        setExpSub(`비디오 ${frameCount}/${totalFrames} 프레임`);
        if(frameCount>=totalFrames){resolve();return;}
        if(frameCount%10===0){
          setTimeout(frame, 0);
        } else {
          frame();
        }
      }
      setTimeout(frame, 0);
    });

    setExpSub('비디오 인코더 플러시...');
    await videoEncoder.flush();
    videoEncoder.close();

    // ── 오디오 인코딩
    if(hasAudio){
      setExpSub('오디오 인코딩...');
      await encodeAudio(muxer,audioRendered,useMP4);
      setExpProgress(95);
    }

    // ── 최종화
    setExpSub('파일 합성 중...');
    muxer.finalize();
    const mimeType = useMP4 ? 'video/mp4' : 'video/webm';
    exportBlob=new Blob([muxer.target.buffer],{type:mimeType});
    setExpProgress(100);

    restoreGlobals();
    const fmtLabel = useMP4 ? `MP4(H.264${hasAudio?'+AAC':''})` : `WebM(VP9${hasAudio?'+Opus':''})`;
    const dlBtn=document.getElementById('btn-dl');
    dlBtn.textContent=`⬇ ${useMP4?'MP4':'WebM'} 다운로드`;
    dlBtn.style.display='block';
    _doneMobExportBtn();
    setStatus(`✅ 완료! ${(exportBlob.size/1024/1024).toFixed(1)}MB · ${fmtLabel}`);
    // 모바일: 완료 즉시 다운로드 플로우 실행
    if(expMobile) setTimeout(()=>downloadVideo(), 400);

  } catch(err){
    console.error('Export error:',err);
    restoreGlobals();
    setStatus('❌ 오류: '+err.message);
  }
}

async function renderAudioOffline(totalDur){
  const sr=44100, total=Math.ceil(totalDur*sr);
  const oc=new OfflineAudioContext(2,total,sr);
  let hasAnyAudio=false;
  if(S.epBgm&&Assets.audio[S.epBgm]?.buffer){
    const src=oc.createBufferSource(); src.buffer=Assets.audio[S.epBgm].buffer; src.loop=true;
    const g=oc.createGain(); g.gain.value=0.18;
    src.connect(g); g.connect(oc.destination); src.start(0);
    hasAnyAudio=true;
  }
  let tOff=0;
  for(const c of S.cuts){
    const dur=c.dur||3;
    const spkCat=c.speaker==='left'?c.leftCat:c.rightCat;
    const ca=Assets.cats[spkCat];
    // 우선순위: ① 컷 직접 지정 SFX → ② 영상 내장 오디오 → ③ 캐릭터 defaultSfx
    if(c.sfx==='__none__'){
      // 무음 명시 — 아무것도 하지 않음
    } else if(c.sfx && Assets.audio[c.sfx]?.buffer){
      const src=oc.createBufferSource(); src.buffer=Assets.audio[c.sfx].buffer; src.loop=true;
      const g=oc.createGain(); g.gain.value=0.28;
      src.connect(g); g.connect(oc.destination);
      src.start(tOff); src.stop(tOff+dur); hasAnyAudio=true;
    } else if(ca?.audioBuffer){
      const src=oc.createBufferSource(); src.buffer=ca.audioBuffer; src.loop=true;
      const g=oc.createGain(); g.gain.value=0.30;
      src.connect(g); g.connect(oc.destination);
      src.start(tOff); src.stop(tOff+dur); hasAnyAudio=true;
    } else {
      const sfxName=catDefaultSfx(spkCat);
      if(sfxName && Assets.audio[sfxName]?.buffer){
        const src=oc.createBufferSource(); src.buffer=Assets.audio[sfxName].buffer; src.loop=true;
        const g=oc.createGain(); g.gain.value=0.28;
        src.connect(g); g.connect(oc.destination);
        src.start(tOff); src.stop(tOff+dur); hasAnyAudio=true;
      }
    }
    tOff+=dur;
  }
  if(!hasAnyAudio) return null;
  return await oc.startRendering();
}

async function encodeAudio(muxer, audioBuffer, useMP4=false){
  const sr=audioBuffer.sampleRate;
  const nCh=audioBuffer.numberOfChannels;
  const nFrames=audioBuffer.length;
  // AAC requires 1024-sample frames; Opus works well with 10ms (≈480 samples at 48kHz)
  const chunkSamples = useMP4 ? 1024 : Math.floor(sr*0.01);

  const leftData=audioBuffer.getChannelData(0);
  const rightData=nCh>1?audioBuffer.getChannelData(1):leftData;

  const audioEncoder=new AudioEncoder({
    output:(chunk,meta)=>muxer.addAudioChunk(chunk,meta),
    error:console.error,
  });
  if(useMP4){
    audioEncoder.configure({codec:'mp4a.40.2',sampleRate:sr,numberOfChannels:2,bitrate:128000});
  } else {
    audioEncoder.configure({codec:'opus',sampleRate:sr,numberOfChannels:2,bitrate:128000});
  }

  for(let i=0;i<nFrames;i+=chunkSamples){
    const size=Math.min(chunkSamples,nFrames-i);
    const merged=new Float32Array(size*2);
    merged.set(leftData.slice(i,i+size),0);
    merged.set(rightData.slice(i,i+size),size);
    const ad=new AudioData({
      format:'f32-planar', sampleRate:sr,
      numberOfFrames:size, numberOfChannels:2,
      timestamp:Math.round(i*1_000_000/sr), data:merged,
    });
    audioEncoder.encode(ad); ad.close();
  }
  await audioEncoder.flush();
  audioEncoder.close();
}

function setExpOverlay(show,sub='',pct=0){
  const ov=document.getElementById('export-overlay');
  ov.style.display=show?'flex':'none';
  if(show){ setExpSub(sub); setExpProgress(pct); }
}
function setExpProgress(pct){
  const p=Math.min(100,Math.round(pct));
  const bar=document.getElementById('exp-bar');
  const txt=document.getElementById('exp-pct');
  if(bar) bar.style.width=p+'%';
  if(txt) txt.textContent=p+'%';
}
function setExpSub(msg){ const el=document.getElementById('exp-sub'); if(el) el.textContent=msg; }

function downloadVideo(){
  if(!exportBlob){setStatus('먼저 영상을 생성하세요');return;}
  const ext=exportBlob.type.includes('mp4')?'mp4':'webm';
  const filename=`reels_${S.epId}_${Date.now()}.${ext}`;
  const url=URL.createObjectURL(exportBlob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
  setStatus(`⬇ 다운로드 중: ${filename}`);
}

// 컷 관리
// ═══════════════════════════════════════════════
function addCut(){
  const base=S.cuts.length>0?JSON.parse(JSON.stringify(S.cuts[S.dlgIdx])):null;
  const ep=S.ep||{background:'',left_name:'L',right_name:'R',default_left_cat:'typing_keyboard',default_right_cat:'talk'};
  const nc=base?Object.assign({},base,{_lbl:{},_diag:{},text:'',sfx:null})
                :mkCut(ep,null);
  S.cuts.splice(S.dlgIdx+1,0,nc);
  S.dlgIdx++;
  renderCuts(); showProps(); draw(); autoSave();
}

function dupCut(){
  if(!S.cuts.length) return;
  const nc=JSON.parse(JSON.stringify(S.cuts[S.dlgIdx]));
  nc._lbl={}; nc._diag={};
  S.cuts.splice(S.dlgIdx+1,0,nc);
  S.dlgIdx++;
  renderCuts(); showProps(); draw(); autoSave();
}

function delCut(){
  if(S.cuts.length<=1){setStatus('최소 1개 컷 필요');return;}
  S.cuts.splice(S.dlgIdx,1);
  S.dlgIdx=Math.max(0,S.dlgIdx-1);
  renderCuts(); showProps(); draw(); autoSave();
}

const LAYOUT_KEYS=['leftH','leftX','leftY','leftFlipH','leftFlipV','rightH','rightX','rightY','rightFlipH','rightFlipV',
  'diagFontSz','diagMaxW','diagBgAlpha','diagColor','diagAuto','diagX','diagY',
  'leftLabelFontSz','leftLabelAuto','leftLabelX','leftLabelY','rightLabelFontSz','rightLabelAuto','rightLabelX','rightLabelY'];

function copyToAll(){
  const src=cut();
  S.cuts.forEach((c,i)=>{ if(i!==S.dlgIdx) LAYOUT_KEYS.forEach(k=>c[k]=src[k]); });
  setStatus(`✅ 레이아웃 전체 복사 완료`); draw();
}

function resetCutLayout(){
  const c=cut(); if(!c) return;
  c.leftH=580;c.leftX=-60;c.leftY=null;c.leftFlipH=false;c.leftFlipV=false;
  c.rightH=580;c.rightX=null;c.rightY=null;c.rightFlipH=false;c.rightFlipV=false;
  c.diagAuto=true;c.diagX=null;c.diagY=null;
  c.leftLabelAuto=true;c.leftLabelX=null;c.leftLabelY=null;
  c.rightLabelAuto=true;c.rightLabelX=null;c.rightLabelY=null;
  c._lbl={};c._diag={};
  S.selected=null; showProps(); draw(); autoSave();
}

function renderCuts(){
  const list=document.getElementById('cut-list');
  document.getElementById('cut-count').textContent=`(${S.cuts.length})`;
  const totalDur=S.cuts.reduce((s,c)=>s+(c.dur||3),0);
  const durEl=document.getElementById('total-dur');
  if(durEl) durEl.textContent=`총 ${totalDur.toFixed(1)}s`;
  list.innerHTML='';
  S.cuts.forEach((c,i)=>{
    const isL=c.speaker==='left';
    const name=isL?(c.leftLabelText||'L'):(c.rightLabelText||'R');
    const txt=(c.text||'').replace(/\n/g,' ').slice(0,36)+(c.text&&c.text.length>36?'…':'');
    const div=document.createElement('div');
    div.className='cut-item'+(i===S.dlgIdx?' active':'');
    div.draggable=true;
    div.innerHTML=`
      <div class="ci-top">
        <span class="ci-num">${i+1}</span>
        <span class="ci-spk ${isL?'spk-l':'spk-r'}">${esc(name)}</span>
        <span class="ci-dur">${c.dur}s</span>
      </div>
      <div class="ci-txt">${esc(txt)||'<span style="color:#334">(대사 없음)</span>'}</div>
      <div class="ci-cats">${esc(c.leftCat)} ↔ ${esc(c.rightCat)}</div>`;
    div.onclick=()=>{ S.dlgIdx=i; S.selected=null; renderCuts(); showProps(); draw(); if(!slideshowActive) playPreviewSfx(S.cuts[i]); };
    div.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',String(i));div.classList.add('dragging');});
    div.addEventListener('dragend',()=>div.classList.remove('dragging'));
    div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over');});
    div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    div.addEventListener('drop',e=>{
      e.preventDefault(); div.classList.remove('drag-over');
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      if(isNaN(from)||from===i) return;
      const [moved]=S.cuts.splice(from,1);
      S.cuts.splice(i,0,moved);
      S.dlgIdx=i;
      renderCuts(); showProps(); draw(); autoSave();
    });
    list.appendChild(div);
  });
  renderMobileCuts();
}

// 마우스 이벤트
// ═══════════════════════════════════════════════
let drag=null;

canvas.addEventListener('mousedown',e=>{
  const{mx,my}=cvCoords(e); const c=cut();
  if(S.selected){
    const b=selBounds();
    if(b){
      const hps=hpositions(b.x,b.y,b.w,b.h);
      for(let i=0;i<hps.length;i++){
        const[hx,hy]=hps[i];
        if(Math.hypot(mx-hx,my-hy)<=HANDLE_R+3){
          if(S.selected==='left'||S.selected==='right'){
            const isL=S.selected==='left';
            drag={type:'resize',handle:i,oh:isL?c.leftH:c.rightH,ox:isL?c.leftX:getRX(c),oy:isL?getLY(c):getRY(c),mx0:mx,my0:my};
          } else if(S.selected==='diag'){
            drag={type:'resize',handle:i,ow:c.diagMaxW,ox:c.diagX??0,mx0:mx,my0:my};
          }
          return;
        }
      }
    }
  }
  const hit=hitTest(mx,my);
  if(hit){
    S.selected=hit;
    if(hit==='left'||hit==='right'){
      const isL=hit==='left';
      drag={type:'move',side:hit,ox:isL?c.leftX:getRX(c),oy:isL?getLY(c):getRY(c),mx0:mx,my0:my};
    } else if(hit==='diag'){
      drag={type:'move-diag',ox:c.diagX??0,oy:c.diagY??0,mx0:mx,my0:my};
    } else if(hit==='leftLabel'||hit==='rightLabel'){
      const isL=hit==='leftLabel';
      drag={type:'move-label',lk:hit,ox:isL?(c.leftLabelX??0):( c.rightLabelX??0),oy:isL?(c.leftLabelY??0):(c.rightLabelY??0),mx0:mx,my0:my};
    } else if(hit==='title'){
      drag={type:'move-title',ox:S.title._cx/SC,oy:S.title._cy/SC,mx0:mx,my0:my};
    }
    showProps(); draw();
  } else { S.selected=null; drag=null; showProps(); draw(); }
});

canvas.addEventListener('mousemove',e=>{
  if(!drag){updateCursor(e);return;}
  const{mx,my}=cvCoords(e); const c=cut(); if(!c) return;
  const dx=(mx-drag.mx0)/SC, dy=(my-drag.my0)/SC;
  if(drag.type==='move'){
    if(drag.side==='left'){c.leftX=Math.round(drag.ox+dx);c.leftY=Math.round(drag.oy+dy);}
    else{c.rightX=Math.round(drag.ox+dx);c.rightY=Math.round(drag.oy+dy);}
  } else if(drag.type==='move-diag'){
    c.diagAuto=false;c.diagX=Math.round(drag.ox+dx);c.diagY=Math.round(drag.oy+dy);
  } else if(drag.type==='move-label'){
    const isL=drag.lk==='leftLabel';
    if(isL){c.leftLabelAuto=false;c.leftLabelX=Math.round(drag.ox+dx);c.leftLabelY=Math.round(drag.oy+dy);}
    else{c.rightLabelAuto=false;c.rightLabelX=Math.round(drag.ox+dx);c.rightLabelY=Math.round(drag.oy+dy);}
  } else if(drag.type==='move-title'){
    S.title.auto=false;S.title.x=Math.round(drag.ox+dx);S.title.y=Math.round(drag.oy+dy);
  } else if(drag.type==='resize'){
    if(S.selected==='left'||S.selected==='right'){
      const isL=S.selected==='left';
      let newH=Math.max(150,Math.round(drag.oh+(drag.handle===0||drag.handle===2?-dy:dy)));
      if(isL){c.leftH=newH;if(drag.handle===0||drag.handle===2)c.leftY=Math.round(drag.oy+drag.oh-newH);}
      else{c.rightH=newH;if(drag.handle===0||drag.handle===2)c.rightY=Math.round(drag.oy+drag.oh-newH);}
    } else if(S.selected==='diag'){
      c.diagMaxW=Math.max(200,Math.round(drag.ow+(drag.handle===1||drag.handle===3?dx:-dx)));
    }
  }
  draw();
});

canvas.addEventListener('mouseup',()=>{ if(drag){drag=null;autoSave();} });
canvas.addEventListener('mouseleave',()=>drag=null);
canvas.addEventListener('dblclick',e=>{
  const c=cut();
  if(S.selected==='diag'){c.diagAuto=true;c.diagX=null;c.diagY=null;draw();}
  else if(S.selected==='leftLabel'){c.leftLabelAuto=true;c.leftLabelX=null;c.leftLabelY=null;draw();}
  else if(S.selected==='rightLabel'){c.rightLabelAuto=true;c.rightLabelX=null;c.rightLabelY=null;draw();}
  else if(S.selected==='title'){S.title.auto=true;S.title.x=null;S.title.y=null;draw();}
});

function cvCoords(e){ const r=canvas.getBoundingClientRect(); const sx=canvas.width/r.width,sy=canvas.height/r.height; return{mx:(e.clientX-r.left)*sx,my:(e.clientY-r.top)*sy}; }
function updateCursor(e){
  const{mx,my}=cvCoords(e);
  if(S.selected){const b=selBounds();if(b){for(const[hx,hy]of hpositions(b.x,b.y,b.w,b.h)){if(Math.hypot(mx-hx,my-hy)<=HANDLE_R+2){canvas.style.cursor='nwse-resize';return;}}}}
  canvas.style.cursor=hitTest(mx,my)?'move':'default';
}
function hitTest(mx,my){
  const c=cut(),t=S.title;
  if(t.enabled&&t._cw&&mx>=t._cx&&mx<=t._cx+t._cw&&my>=t._cy&&my<=t._cy+t._ch) return 'title';
  if(c._diag?.cw&&mx>=c._diag.cx&&mx<=c._diag.cx+c._diag.cw&&my>=c._diag.cy&&my<=c._diag.cy+c._diag.ch) return 'diag';
  for(const k of['leftLabel','rightLabel']){const lb=c._lbl[k];if(lb?.cw&&mx>=lb.cx&&mx<=lb.cx+lb.cw&&my>=lb.cy&&my<=lb.cy+lb.ch)return k;}
  for(const side of['left','right']){
    const name=side==='left'?c.leftCat:c.rightCat,h=side==='left'?c.leftH:c.rightH;
    const cw=catWF(name,h)*SC,ch=h*SC,ox=(side==='left'?c.leftX:getRX(c))*SC,oy=(side==='left'?getLY(c):getRY(c))*SC;
    if(mx>=Math.max(0,ox)&&mx<=Math.min(CW,ox+cw)&&my>=Math.max(0,oy)&&my<=Math.min(CH,oy+ch))return side;
  }
  return null;
}

// ═══════════════════════════════════════════════
// 미리보기 오디오
// ═══════════════════════════════════════════════
let _previewAC=null;    // AudioContext (재사용)
let _previewBgmSrc=null; // BGM SourceNode (루프)
let _previewSfxSrc=null; // SFX SourceNode (컷별)

function getPreviewAC(){
  if(!_previewAC||_previewAC.state==='closed'){
    _previewAC=new (window.AudioContext||window.webkitAudioContext)();
  }
  if(_previewAC.state==='suspended') _previewAC.resume();
  return _previewAC;
}

function startPreviewBgm(){
  stopPreviewBgm();
  if(!S.epBgm||!Assets.audio[S.epBgm]?.buffer) return;
  const ac=getPreviewAC();
  const g=ac.createGain(); g.gain.value=0.18; g.connect(ac.destination);
  const src=ac.createBufferSource(); src.buffer=Assets.audio[S.epBgm].buffer; src.loop=true;
  src.connect(g); src.start();
  _previewBgmSrc=src;
}

function stopPreviewBgm(){
  if(_previewBgmSrc){try{_previewBgmSrc.stop();}catch(e){} _previewBgmSrc=null;}
}

function playPreviewSfx(c){
  // 이전 SFX 중지
  if(_previewSfxSrc){try{_previewSfxSrc.stop();}catch(e){} _previewSfxSrc=null;}
  if(c.sfx==='__none__') return; // 무음 명시
  const spkCat=c.speaker==='left'?c.leftCat:c.rightCat;
  const ca=Assets.cats[spkCat];
  // 우선순위: ① 컷 직접 지정 SFX → ② 영상 내장 오디오 → ③ 캐릭터 defaultSfx
  let buf=null;
  if(c.sfx && Assets.audio[c.sfx]?.buffer){
    buf=Assets.audio[c.sfx].buffer;
  } else if(ca?.audioBuffer){
    buf=ca.audioBuffer;
  } else {
    const sfxName=catDefaultSfx(spkCat);
    if(sfxName && Assets.audio[sfxName]?.buffer) buf=Assets.audio[sfxName].buffer;
  }
  if(!buf) return;
  const ac=getPreviewAC();
  const g=ac.createGain(); g.gain.value=0.4; g.connect(ac.destination);
  const src=ac.createBufferSource(); src.buffer=buf; src.loop=true;
  src.connect(g); src.start();
  _previewSfxSrc=src;
  setTimeout(()=>{ if(_previewSfxSrc===src){try{src.stop();}catch(e){} _previewSfxSrc=null;} },(c.dur||3)*1000);
}

function stopAllPreviewAudio(){
  stopPreviewBgm();
  if(_previewSfxSrc){try{_previewSfxSrc.stop();}catch(e){} _previewSfxSrc=null;}
}

// 슬라이드쇼
// ═══════════════════════════════════════════════
let slideshowActive=false, slideshowTimer=null;

function toggleSlideshow(){
  if(slideshowActive){stopSlideshow();return;}
  const btn=document.getElementById('btn-slide');
  btn.classList.add('slide-on'); btn.textContent='⏹ 중지';
  const mbtn=document.getElementById('mob-slide-btn');
  if(mbtn){mbtn.classList.add('slide-on');mbtn.textContent='⏹ 중지';}
  slideshowActive=true;
  setStatus('슬라이드쇼 재생 중...');
  startPreviewBgm();
  playStep(0);
}

function playStep(idx){
  if(!slideshowActive){stopSlideshow();return;}
  const n=S.cuts.length; if(!n){stopSlideshow();return;}
  const i=idx%n; S.dlgIdx=i;
  document.querySelectorAll('.cut-item').forEach((el,j)=>el.classList.toggle('active',j===i));
  renderMobileCuts();
  draw();
  playPreviewSfx(S.cuts[i]);
  slideshowTimer=setTimeout(()=>playStep(idx+1),(S.cuts[i]?.dur||3)*1000);
}

function stopSlideshow(){
  slideshowActive=false;
  if(slideshowTimer){clearTimeout(slideshowTimer);slideshowTimer=null;}
  stopAllPreviewAudio();
  const btn=document.getElementById('btn-slide');
  btn.classList.remove('slide-on'); btn.textContent='▶ 슬라이드';
  const mbtn=document.getElementById('mob-slide-btn');
  if(mbtn){mbtn.classList.remove('slide-on');mbtn.textContent='▶ 미리보기';}
  setStatus('슬라이드쇼 중지');
}

// 저장 / 불러오기
// ═══════════════════════════════════════════════
const SAVE_KEY='reels_editor_v5';
const SKIP_KEYS=['_lbl','_diag'];

// ─ Undo/Redo ─
const _history=[];
let _historyIdx=-1;
let _suppressHistory=false;

function _makeSnap(){
  const cuts=S.cuts.map(c=>{const o={};for(const[k,v]of Object.entries(c)){if(!SKIP_KEYS.includes(k))o[k]=v;}return o;});
  const title={...S.title};delete title._cx;delete title._cy;delete title._cw;delete title._ch;
  return JSON.stringify({ep_id:S.epId,bgm:S.epBgm,title,cuts});
}

function _pushHistory(snap){
  if(_historyIdx<_history.length-1) _history.splice(_historyIdx+1);
  _history.push(snap);
  if(_history.length>30) _history.shift();
  _historyIdx=_history.length-1;
}

function undo(){
  if(_historyIdx<=0){setStatus('더 이상 되돌릴 수 없습니다');return;}
  _historyIdx--;
  _suppressHistory=true;
  restoreData(JSON.parse(_history[_historyIdx]));
  _suppressHistory=false;
  setStatus('↩ 실행 취소');
}

function redo(){
  if(_historyIdx>=_history.length-1){setStatus('더 이상 다시 실행할 수 없습니다');return;}
  _historyIdx++;
  _suppressHistory=true;
  restoreData(JSON.parse(_history[_historyIdx]));
  _suppressHistory=false;
  setStatus('↪ 다시 실행');
}

function autoSave(){
  try{
    const snap=_makeSnap();
    localStorage.setItem(SAVE_KEY,snap);
    if(!_suppressHistory) _pushHistory(snap);
  }catch(e){}
}

function restoreData(data){
  if(data.ep_id){
    const ep=EPISODES.find(e=>e.id===data.ep_id)||EPISODES[0];
    S.epId=ep.id; S.ep=ep;
    document.getElementById('ep-sel').value=ep.id;
  }
  if(data.bgm!==undefined){S.epBgm=data.bgm||null;const s=document.getElementById('bgm-sel');if(s)s.value=S.epBgm||'(없음)';}
  if(data.title) S.title=Object.assign({enabled:false,text:'',fontSz:52,bgAlpha:170,color:'#ffffff',auto:true,x:null,y:null,autoY:60,_cx:0,_cy:0,_cw:0,_ch:0},data.title,{_cx:0,_cy:0,_cw:0,_ch:0});
  if(data.cuts&&Array.isArray(data.cuts)) S.cuts=data.cuts.map(c=>Object.assign({_lbl:{},_diag:{}},c));
  S.dlgIdx=0; renderCuts(); showProps(); draw();
}

function exportJson(){
  const cuts=S.cuts.map(c=>{const o={};for(const[k,v]of Object.entries(c)){if(!SKIP_KEYS.includes(k))o[k]=v;}return o;});
  const title={...S.title}; delete title._cx;delete title._cy;delete title._cw;delete title._ch;
  const json=JSON.stringify({ep_id:S.epId,bgm:S.epBgm,title,cuts},null,2);
  document.getElementById('json-ta').value=json;
  navigator.clipboard?.writeText(json).then(()=>setStatus('JSON 복사됨')).catch(()=>{});
}

function importJson(){
  try{
    const data=JSON.parse(document.getElementById('json-ta').value);
    restoreData(data); closeModal('json-modal');
    setStatus('JSON 불러옴');
  }catch(e){ alert('JSON 오류: '+e.message); }
}

let _pendingCatFile=null;
function onCatFile(input){
  const file=input.files[0]; input.value='';
  if(!file) return;
  _pendingCatFile=file;
  const form=document.getElementById('cat-form');
  const nameInput=document.getElementById('cat-name');
  if(form&&nameInput){
    form.classList.add('show');
    nameInput.value=file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_]/g,'_').toLowerCase();
  }
}
function cancelCat(){ _pendingCatFile=null; const f=document.getElementById('cat-form'); if(f) f.classList.remove('show'); }
function confirmCat(){
  if(!_pendingCatFile) return;
  const name=(document.getElementById('cat-name').value||'').trim().replace(/\s+/g,'_');
  const faces=document.getElementById('cat-faces').value;
  const defaultSfx=document.getElementById('cat-sfx').value||null;
  if(!name){alert('이름을 입력하세요');return;}
  const file=_pendingCatFile; _pendingCatFile=null;
  cancelCat();
  const url=URL.createObjectURL(file);
  const vid=document.createElement('video');
  vid.src=url; vid.loop=true; vid.muted=true; vid.playsInline=true; vid.autoplay=true;
  vid.onloadedmetadata=()=>{
    Assets.cats[name]={video:vid,faces,src_w:vid.videoWidth,src_h:vid.videoHeight,aspect:vid.videoWidth/vid.videoHeight,ready:false,audioBuffer:null,defaultSfx,src:url};
    rebuildCatInfo();
    vid.play().then(()=>{
      Assets.cats[name].ready=true;
      file.arrayBuffer().then(ab=>{
        const ac=new (window.AudioContext||window.webkitAudioContext)();
        ac.decodeAudioData(ab).then(buf=>{Assets.cats[name].audioBuffer=buf;ac.close();}).catch(()=>ac.close());
      });
      renderCuts(); renderAssetContent('cat'); showProps();
      setStatus(`✅ '${name}' 업로드 완료`);
    });
  };
  vid.onerror=()=>setStatus('❌ 영상 로드 실패');
  vid.load();
}
function delCatAsset(name){
  if(Assets.cats[name]?.builtin){setStatus('기본 에셋은 삭제할 수 없습니다');return;}
  if(!confirm(`'${name}' 삭제?`)) return;
  if(Assets.cats[name]?.src) URL.revokeObjectURL(Assets.cats[name].src);
  delete Assets.cats[name]; rebuildCatInfo();
  renderCuts(); renderAssetContent('cat'); showProps();
}

async function loadBuiltinAssets(){
  // 배경 이미지 (즉시 비동기 로드)
  for(const {name, file} of BUILTIN_BGS){
    const img=new Image();
    img.onload=()=>{ Assets.backgrounds[name]={img,ready:true,builtin:true}; draw(); };
    img.src=file;
  }
  // 고양이 영상 (video 엘리먼트 방식)
  for(const {name, file, faces, defaultSfx} of BUILTIN_CATS){
    const vid=document.createElement('video');
    vid.src=file; vid.loop=true; vid.muted=true; vid.playsInline=true;
    Assets.cats[name]={video:vid,faces,src_w:0,src_h:0,aspect:1.78,ready:false,audioBuffer:null,defaultSfx:defaultSfx||null,builtin:true};
    rebuildCatInfo();
    vid.onloadedmetadata=()=>{
      const a=Assets.cats[name];
      a.src_w=vid.videoWidth; a.src_h=vid.videoHeight; a.aspect=vid.videoWidth/vid.videoHeight;
      rebuildCatInfo();
      vid.play().then(()=>{
        a.ready=true; draw();
        // 영상 내장 오디오 백그라운드 디코딩
        fetch(file).then(r=>r.arrayBuffer()).then(ab=>{
          const ac=new (window.AudioContext||window.webkitAudioContext)();
          ac.decodeAudioData(ab).then(buf=>{ a.audioBuffer=buf; ac.close(); }).catch(()=>ac.close());
        }).catch(()=>{});
      }).catch(()=>{});
    };
    vid.load();
  }
  // SFX 오디오 (fetch → decodeAudioData)
  for(const {name, file} of BUILTIN_AUDIO){
    try{
      const resp=await fetch(file);
      if(!resp.ok) continue;
      const ab=await resp.arrayBuffer();
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      try{ const buf=await ac.decodeAudioData(ab); Assets.audio[name]={buffer:buf,builtin:true}; rebuildBgmSel(); }
      catch(e){}
      finally{ ac.close(); }
    }catch(e){ console.warn('builtin audio load fail:',name); }
  }
}

// ═══════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// 모바일 지원
// ═══════════════════════════════════════════════
function isMobile(){ return window.matchMedia('(max-width:768px)').matches; }

// 터치 → 마우스 변환 (캔버스 오브젝트 드래그/리사이즈)
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown',{bubbles:true,clientX:t.clientX,clientY:t.clientY}));
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove',{bubbles:true,clientX:t.clientX,clientY:t.clientY}));
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('mouseup',{bubbles:true}));
},{passive:false});

// 모바일 컷 스트립 렌더링
function renderMobileCuts(){
  const strip=document.getElementById('mob-cut-strip');
  if(!strip) return;
  strip.innerHTML='';
  S.cuts.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='mob-cut'+(i===S.dlgIdx?' active':'');
    const txt=(c.text||'').replace(/\n/g,' ').slice(0,10)||'...';
    div.innerHTML=`<span class="mob-cut-num">${i+1}</span><span class="mob-cut-txt">${esc(txt)}</span>`;
    div.onclick=()=>{S.dlgIdx=i;S.selected=null;renderCuts();showProps();draw();if(!slideshowActive)playPreviewSfx(S.cuts[i]);};
    strip.appendChild(div);
  });
  const active=strip.querySelector('.mob-cut.active');
  if(active) active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

// iOS: 첫 사용자 제스처 시 모든 비디오 unlock
function _unlockVideos(){
  Object.values(Assets.cats).forEach(a=>{
    if(a.video){
      a.video.play().then(()=>{a.ready=true;draw();}).catch(()=>{});
    }
  });
}
document.addEventListener('pointerdown',_unlockVideos,{once:true});
document.addEventListener('touchstart',_unlockVideos,{once:true,passive:true});

// 탭/앱 복귀 시 비디오 재개
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    Object.values(Assets.cats).forEach(a=>{
      if(a.video&&a.ready&&a.video.paused) a.video.play().catch(()=>{});
    });
  }
});

// 모바일 속성 시트 열기/닫기/동기화
function openMobileProps(){
  const inner=document.getElementById('mob-sheet-inner');
  if(inner) inner.innerHTML=document.getElementById('rpanel-body').innerHTML;
  document.getElementById('mob-backdrop').classList.add('open');
  document.getElementById('mob-sheet').classList.add('open');
}
function closeMobileProps(){
  document.getElementById('mob-backdrop').classList.remove('open');
  document.getElementById('mob-sheet').classList.remove('open');
}
function syncMobileProps(){
  const sheet=document.getElementById('mob-sheet');
  if(!sheet?.classList.contains('open')) return;
  const inner=document.getElementById('mob-sheet-inner');
  if(inner) inner.innerHTML=document.getElementById('rpanel-body').innerHTML;
}

// ═══════════════════════════════════════════════
// 키보드 단축키
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();return;}
  if(e.ctrlKey&&(e.key==='y'||e.key==='Z')){e.preventDefault();redo();return;}
  if(e.ctrlKey&&e.key==='d'){e.preventDefault();dupCut();return;}
  if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();delCut();return;}
  if(e.key==='Escape'){e.preventDefault();S.selected=null;draw();return;}
  if(e.key===' '){e.preventDefault();toggleSlideshow();return;}
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'||e.key==='ArrowUp'||e.key==='ArrowDown'){
    if(!S.selected) return;
    e.preventDefault();
    const step=e.shiftKey?10:1;
    const c=cut(); if(!c) return;
    if(S.selected==='left'){
      if(e.key==='ArrowLeft') c.leftX=(c.leftX??-60)-step;
      else if(e.key==='ArrowRight') c.leftX=(c.leftX??-60)+step;
      else if(e.key==='ArrowUp') c.leftY=getLY(c)-step;
      else c.leftY=getLY(c)+step;
    } else if(S.selected==='right'){
      if(e.key==='ArrowLeft') c.rightX=getRX(c)-step;
      else if(e.key==='ArrowRight') c.rightX=getRX(c)+step;
      else if(e.key==='ArrowUp') c.rightY=getRY(c)-step;
      else c.rightY=getRY(c)+step;
    } else if(S.selected==='diag'){
      c.diagAuto=false;
      if(e.key==='ArrowLeft') c.diagX=(c.diagX??0)-step;
      else if(e.key==='ArrowRight') c.diagX=(c.diagX??0)+step;
      else if(e.key==='ArrowUp') c.diagY=(c.diagY??0)-step;
      else c.diagY=(c.diagY??0)+step;
    } else if(S.selected==='title'){
      S.title.auto=false;
      if(e.key==='ArrowLeft') S.title.x=(S.title.x??0)-step;
      else if(e.key==='ArrowRight') S.title.x=(S.title.x??0)+step;
      else if(e.key==='ArrowUp') S.title.y=(S.title.y??0)-step;
      else S.title.y=(S.title.y??0)+step;
    }
    draw(); autoSave(); showProps();
  }
});

function init(){
  rebuildCatInfo();
  const sel=document.getElementById('ep-sel');
  EPISODES.forEach(e=>{
    const o=document.createElement('option');
    o.value=e.id; o.textContent=`EP.${e.id} — ${e.desc}`;
    sel.appendChild(o);
  });
  // 기본 에셋 백그라운드 로딩 (UI 블로킹 없음)
  loadBuiltinAssets();
  // iOS 등 VP9 미지원 기기 → MP4 강제
  if(window.VideoEncoder){
    VideoEncoder.isConfigSupported({codec:'vp09.00.10.08',width:1080,height:1920,bitrate:4_000_000,framerate:30})
      .then(s=>{
        if(!s.supported){
          const fmt=document.getElementById('sel-fmt');
          if(fmt){fmt.value='mp4';const wo=fmt.querySelector('option[value="webm"]');if(wo)wo.disabled=true;}
          if(isMobile()) setStatus('iOS: MP4 전용 모드');
        }
      }).catch(()=>{});
  }
  const saved=localStorage.getItem(SAVE_KEY);
  if(saved){
    try{
      const data=JSON.parse(saved);
      if(data?.cuts?.length){
        restoreData(data); startAnim();
        setStatus('✅ 이전 작업 복원됨');
        return;
      }
    }catch(e){}
  }
  loadEp(1);
  startAnim();
}

init();
</script>
